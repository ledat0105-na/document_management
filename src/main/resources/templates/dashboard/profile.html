<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Trang cá nhân</title>
  <style>
    :root{--bg:#0b1020;--panel:#111831;--muted:#91a0b6;--text:#e7ecf5;--brand:#6ea8ff;--brand-2:#9df2d2;--line:rgba(255,255,255,.08);--shadow:0 10px 30px rgba(0,0,0,.25);--radius:16px}
    body{margin:0;font-family:Inter,system-ui;background:linear-gradient(120deg,var(--bg) 30%,#0a1a2a 100%);color:var(--text)}
    .container{max-width:980px;margin:40px auto;padding:20px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .title{display:flex;align-items:center;gap:12px}
    .title .dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--brand-2))}
    .title h2{margin:0;font-size:22px}
    .subtitle{color:var(--muted);margin:4px 0 0 26px;font-size:13px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:900px){.grid{grid-template-columns:1fr 1fr}}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
    .section h3{margin:0 0 10px 0;font-size:16px}
    .field{display:grid;gap:6px;margin:10px 0}
    label{font-size:13px}
    input{background:#0e1530;border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--text)}
    .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#0e1530;color:var(--text);text-decoration:none;font-weight:600;cursor:pointer}
    .btn.primary{background:linear-gradient(135deg,#246bff,#15c2a7);border-color:transparent;color:#fff}
    .btn.ghost{background:transparent}
    .btn.danger{background:#dc3545;border-color:#dc3545;color:#fff}
    .alert{padding:10px;border-radius:12px;margin:10px 0}
    .ok{background:#113f2a;color:#a7ffd0}
    .err{background:#3a2a1a;color:#ffd0a7}
  </style>
</head>
<body>
  <div class="container">
    <p><a href="/dashboard" class="btn">← Về Dashboard</a></p>
    <div class="card">
      <div class="header">
        <div>
          <div class="title"><span class="dot"></span><h2>Trang cá nhân</h2></div>
          <p class="subtitle">Cập nhật thông tin tài khoản và bảo mật</p>
        </div>
      </div>

      <div th:if="${message}" class="alert ok" th:text="${message}"></div>
      <div th:if="${error}" class="alert err" th:text="${error}"></div>

      <div class="grid">
        <div class="section card" style="padding:18px">
          <h3>Thông tin tài khoản</h3>
          <form th:action="@{/profile}" method="post">
            <div class="field">
              <label>Tên hiển thị</label>
              <input type="text" name="displayName" th:value="${displayName}" placeholder="Tên của bạn"/>
            </div>
            <div class="field">
              <label>Email</label>
              <input type="email" name="email" th:value="${email}" required/>
            </div>
            <div class="actions">
              <button type="submit" class="btn primary">Lưu thay đổi</button>
            </div>
          </form>
        </div>

        <div class="section card" style="padding:18px">
          <h3>Bảo mật</h3>
          <form th:action="@{/profile}" method="post">
            <div class="field">
              <label>Mật khẩu mới</label>
              <input type="password" name="password" minlength="6" placeholder="Để trống nếu không đổi"/>
            </div>
            <div class="field">
              <label>Xác nhận mật khẩu</label>
              <input type="password" name="confirmPassword" minlength="6" placeholder="Nhập lại mật khẩu"/>
            </div>
            <div class="actions">
              <button type="submit" class="btn">Cập nhật mật khẩu</button>
            </div>
          </form>
        </div>
      </div>

      <div class="section card" style="padding:18px;margin-top:16px">
        <h3 style="margin-top:0">Xóa tài khoản</h3>
        <p style="color:var(--muted);margin:0 0 10px 0">Chỉ xóa được khi không còn tài liệu, thư mục hoặc tệp lưu trữ. Dữ liệu vẫn được giữ lại trong hệ thống.</p>
        <button class="btn danger" onclick="checkAndDeleteAccount()">Xóa tài khoản</button>
      </div>
    </div>
  </div>

  <script>
    function checkAndDeleteAccount() {
      fetch('/dashboard/check-data')
        .then(r => r.json())
        .then(data => {
          if (data.hasData) {
            showDeleteWarningModal(data);
          } else {
            showConfirmDeleteModal();
          }
        })
        .catch(() => showErrorModal('Lỗi khi kiểm tra dữ liệu. Vui lòng thử lại.'));
    }

    function deleteAccount() {
      fetch('/dashboard/delete-account', { method: 'POST' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            window.location.href = '/login';
          } else {
            showErrorModal(data.message || 'Không thể xóa tài khoản.');
          }
        })
        .catch(() => showErrorModal('Lỗi khi xóa tài khoản. Vui lòng thử lại.'));
    }

    function showConfirmDeleteModal(){
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center';
      modal.innerHTML = `
        <div style="background:#111831;border:1px solid rgba(255,255,255,.08);border-radius:16px;max-width:520px;width:90%;padding:24px;color:#e7ecf5;box-shadow:0 10px 30px rgba(0,0,0,.25)">
          <h3 style="margin:0 0 12px 0">Xác nhận xóa tài khoản</h3>
          <p style="margin:0 0 18px 0;color:#91a0b6">Bạn có chắc chắn muốn xóa tài khoản hiện tại? Hành động này không thể hoàn tác.</p>
          <div style="display:flex;gap:10px;justify-content:flex-end">
            <button style="padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:#0e1530;color:#e7ecf5" onclick="this.closest('div').parentElement.parentElement.remove()">Hủy</button>
            <button style="padding:10px 14px;border-radius:10px;border:1px solid transparent;background:linear-gradient(135deg,#ff5c9a,#ff98c0);color:white" onclick="this.closest('div').parentElement.parentElement.remove(); deleteAccount();">Xóa tài khoản</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }

    function showDeleteWarningModal(data){
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center';
      modal.innerHTML = `
        <div style="background:#111831;border:1px solid rgba(255,255,255,.08);border-radius:16px;max-width:560px;width:92%;padding:24px;color:#e7ecf5;box-shadow:0 10px 30px rgba(0,0,0,.25)">
          <h3 style="margin:0 0 12px 0;color:#ff5c9a">⚠️ Không thể xóa tài khoản</h3>
          <p style="margin:0 0 12px 0;color:#91a0b6">Vui lòng xóa hết dữ liệu sau để xóa tài khoản:</p>
          <ul style="margin:0 0 18px 0;padding-left:20px;color:#e7ecf5">
            ${data.documents > 0 ? `<li>Tài liệu: ${data.documents} tệp</li>` : ''}
            ${data.folders > 0 ? `<li>Thư mục: ${data.folders} thư mục</li>` : ''}
            ${data.archived > 0 ? `<li>Lưu trữ: ${data.archived} tệp</li>` : ''}
          </ul>
          <div style="display:flex;gap:10px;justify-content:flex-end">
            <button style="padding:10px 14px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:#0e1530;color:#e7ecf5" onclick="this.closest('div').parentElement.parentElement.remove()">Đóng</button>
            <a href="/documents" style="padding:10px 14px;border-radius:10px;border:1px solid transparent;background:linear-gradient(135deg,#246bff,#15c2a7);color:white;text-decoration:none">Vào quản lý tài liệu</a>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }

    function showErrorModal(message){
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;display:flex;align-items:center;justify-content:center';
      modal.innerHTML = `
        <div style="background:#111831;border:1px solid rgba(255,255,255,.08);border-radius:16px;max-width:520px;width:90%;padding:24px;color:#e7ecf5;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.25)">
          <div style="font-size:28px;margin-bottom:8px">⚠️</div>
          <h3 style="margin:0 0 10px 0">Không thể xóa tài khoản</h3>
          <p style="margin:0 0 18px 0;color:#91a0b6">${message || 'Vui lòng thử lại sau.'}</p>
          <div style="display:flex;gap:10px;justify-content:center">
            <button style="padding:10px 14px;border-radius:10px;border:1px solid transparent;background:linear-gradient(135deg,#246bff,#15c2a7);color:white" onclick="this.closest('div').parentElement.parentElement.remove()">Đóng</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }
  </script>
</body>
</html>
