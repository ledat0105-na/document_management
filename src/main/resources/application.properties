## Security bootstrap admin (can override via env vars DM_ADMIN_EMAIL, DM_ADMIN_PASSWORD)
app.admin.email=${DM_ADMIN_EMAIL:admin@example.com}
app.admin.password=${DM_ADMIN_PASSWORD:admin123}

## Mail settings (configure with your Gmail SMTP or provider)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:yourgmail@gmail.com}
spring.mail.password=${MAIL_PASSWORD:app-specific-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

## Session timeout (3 minutes) - auto logout after inactivity
server.servlet.session.timeout=180
spring.session.store-type=none
server.servlet.session.persistent=false
server.servlet.session.cookie.max-age=180

spring.application.name=document_management

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/document_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=lambieng

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.thymeleaf.cache=false
server.port=8080

# File storage root for physical files
app.storage.root=storage

# File upload size limits (prevent HTTP 413)
spring.servlet.multipart.max-file-size=256MB
spring.servlet.multipart.max-request-size=256MB